<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }
        .header { background-color: #064E3B; padding: 30px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }
        .content { padding: 40px 30px; color: #374151; line-height: 1.6; }
        .button { display: inline-block; background-color: #064E3B; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        .footer { background-color: #f3f4f6; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Xentrix Notification</h1>
        </div>
        <div class="content">
            <p>Hi {{ username }},</p>
            <p><strong>{{ title }}</strong></p>
            <p>{{ message }}</p>
            <p>To view the details, click the button below.</p>
            
            <a href="{{ action_url }}" class="button">View Details</a>
            
            <p style="margin-top: 30px;">Best regards,<br>The Xentrix Team</p>
        </div>
        <div class="footer">
            © {% now "Y" %} Xentrix CRM. 100 Innovation Drive, San Francisco, CA.
        </div>
    </div>
</body>
</html>
